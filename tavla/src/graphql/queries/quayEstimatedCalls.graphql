query QuayEstimatedCalls($quayId: String!, $numberOfDepartures: Int = 200) {
    quay(id: $quayId) {
        estimatedCalls(
            numberOfDepartures: $numberOfDepartures
            numberOfDeparturesPerLineAndDestinationDisplay: 1
            timeRange: 604800
            includeCancelledTrips: false
        ) {
            destinationDisplay {
                frontText
            }
            serviceJourney {
                line {
                    id
                }
            }
        }
    }
}
